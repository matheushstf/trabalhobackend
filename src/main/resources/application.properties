# Application
spring.application.name=trabalhobackend
server.port=8080

# SQLite DataSource
spring.datasource.url=jdbc:sqlite:trabalhobackend.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.datasource.username=
spring.datasource.password=

# JPA/Hibernate
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# Flyway Migration
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
spring.flyway.validate-on-migrate=true
spring.flyway.url=jdbc:sqlite:trabalhobackend.db
spring.flyway.user=
spring.flyway.password=

# Logging Flyway
logging.level.org.flywaydb=DEBUG

# JWT Configuration
jwt.secret=${JWT_SECRET:minha-chave-secreta-super-segura-para-jwt-token-2024-mudar-em-producao}
jwt.expiration=86400000

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized

# Logging
logging.level.root=INFO
logging.level.matheus.stefanello.trabalhobackend=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# CORS (will be configured in SecurityConfig)
# Permitir origens: http://localhost:3000, http://localhost:4200

# File Upload (opcional para imagens de produtos)
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB
